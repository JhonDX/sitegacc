version: '3.8'

services:
  web:
    build: .
    container_name: Gacc
    ports:
      - "80:80"

    # Garante que o container rode como www-data
    user: "33:33"

    volumes:
      - ../storage/dados:/var/www/html/dados
      - ../storage/uploads:/var/www/html/uploads

    restart: unless-stopped